# 한국 공문서(공문) 작성 규칙
# 출처: 행정안전부 「2025 행정업무운영 편람」 (발간등록번호 11-1741000-100061-14)
# 근거법령: 「행정업무의 운영 및 혁신에 관한 규정」, 동 시행규칙
# 최종 갱신: 2026-04-20
# License: CC-BY (공공저작물 자유이용)

meta:
  source: "2025 행정업무운영 편람"
  publisher: "행정안전부"
  version: "2025.12"
  registration_number: "11-1741000-100061-14"

# ═══════════════════════════════════════════════════════════
# 1. 문서 유형
# ═══════════════════════════════════════════════════════════
document_types:
  일반기안문:
    rule: "규칙 제3조제1항, 별지 제1호서식"
    purpose: "일반적 발송용 공문 (대외 시행문 포함)"
    convertible_to_시행문: true
    structure: [두문, 본문, 결문]

  간이기안문:
    rule: "규칙 제3조제1항, 별지 제2호서식"
    purpose: "내부결재 전용 (보고서·계획서·검토서)"
    convertible_to_시행문: false
    structure: [관리정보, 결재란, 제목, 작성일, 작성기관]

  일괄기안:
    rule: "규칙 제5조제1항"
    purpose: "관련 있는 2개 이상의 안건을 동시에 기안"
    constraints:
      - "각각의 기안문에 두문·본문·결문 모두 포함"
      - "'제1안·제2안' 등 용어 사용 금지"
      - "특별 사유 없으면 서로 다른 생산등록번호 + 같은 날짜"

  공동기안:
    rule: "영 제8조제3항, 규칙 제5조제2항"
    purpose: "2 이상 행정기관의 장의 결재로 공동 명의 시행"
    constraints:
      - "주관기관 먼저, 관계기관 뒤"
      - "관인은 주관기관만 날인"
      - "정부조직법에 따른 부·처·청 순위"

# ═══════════════════════════════════════════════════════════
# 2. 문서의 구성 체계 (영 제4조, 규칙 제4조)
# ═══════════════════════════════════════════════════════════
structure:
  두문:
    - 행정기관명       # 중앙 정렬, 위쪽 기본선
    - 수신            # 왼쪽 기본선, "수신 ㅇㅇㅇ장관(ㅇㅇ업무담당과장)"
    - 경유            # 선택적, 없으면 빈칸
  본문:
    - 제목            # 중앙 또는 왼쪽, 밑줄
    - 관련문서표시     # 선택적, "ㅇㅇ부 ㅇㅇㅇ과-123(2025. 9. 20., '제목')호"
    - 내용            # 항목 기호 구조화
    - 붙임            # "붙임 VV 1. 서식 1부. VV 끝."
  결문:
    - 발신명의         # 중앙, 큰 글씨 (예: "행정안전부장관")
    - 수신자           # "수신자 참조" 시 수신자 목록
    - 기안자_검토자_결재권자  # 직위(직급) + 서명 / 용어 표시 안 함
    - 협조자           # 선택적
    - 시행번호와_시행일   # "시행 처리과명-일련번호(시행일)"
    - 접수번호와_접수일   # 수신 시 기록
    - 우편번호_도로명주소   # "우 30112 세종특별자치시 도움6로 42"
    - 홈페이지_주소       # "www.mois.go.kr"
    - 전화번호_팩스번호    # "(044)205-0000  팩스번호 (044)204-0000"
    - 공무원_전자우편       # "abcde@mois.go.kr"
    - 공개구분             # "공개" | "부분공개" | "비공개" | "대국민공개"

# ═══════════════════════════════════════════════════════════
# 3. 규격
# ═══════════════════════════════════════════════════════════
paper:
  size: "A4"
  width_mm: 210
  height_mm: 297
  basis: "영 제7조제6항"

# 기본선 좌표 개념 (편람 p55 도식 참조)
baseline:
  top_basic_line: "위쪽 기본선"       # 행정기관명 시작 위치
  left_basic_line: "왼쪽 기본선"     # 본문 항목 시작 기준
  right_limit_line: "오른쪽 한계선"   # 본문 종료 한계
  bottom_limit_line: "아래쪽 한계선"  # 결문 종료 한계

# ═══════════════════════════════════════════════════════════
# 4. 서식 (폰트·크기·줄간격)
# ═══════════════════════════════════════════════════════════
typography:
  # 편람은 명시적 폰트 지정이 없음. 현장 관례 + 다음 기준 준수:
  font:
    default_family: "바탕체 또는 굴림체"   # 정해진 규정 없음, 기관별 자율
    recommended: "맑은 고딕"              # 2022.06~ 정부 권장 (가독성)
    notes: "서식을 통일하되 기관별 특성 반영 가능"

  # 현장 표준 (블로그·실무 관례, 편람 원문에는 명시 X)
  sizes:
    행정기관명: { pt: 16, bold: true, align: "CENTER" }  # 관례
    수신_경유_제목: { pt: 13, line_height: 130 }       # 실무 표준
    본문_내용: { pt: 12, line_height: 160 }            # 실무 표준
    본문_표: { pt: 10, line_height: 130 }
    결문: { pt: 10, line_height: 100 }
    붙임: { pt: 12, line_height: 160 }

# ═══════════════════════════════════════════════════════════
# 5. 표기 규칙 (편람 §4. 문서의 작성 기준, p49)
# ═══════════════════════════════════════════════════════════
notation:
  숫자:
    rule: "영 제7조제4항"
    format: "아라비아 숫자"
    examples: ["2025", "113,560"]

  날짜:
    rule: "영 제7조제5항"
    format: "YYYY. M. D."
    separator: ". "        # 마침표+공백
    leading_zero: false     # 월/일의 '0' 표기 안 함
    examples:
      correct: ["2025. 9. 20.", "1985. 9. 6.", "2021. 12. 12."]
      incorrect: ["2025.9.20.", "1985.09.06.", "2021-12-12"]

  시간:
    rule: "영 제7조제5항"
    format: "HH:MM"
    system: "24시각제"
    separator: ":"
    examples:
      correct: ["15:20", "07:09"]
      incorrect: ["오후 3시 20분", "15시 20분"]

  금액:
    rule: "규칙 제2조제2항"
    format: "금{아라비아숫자}원({한글숫자})"
    examples:
      correct: "금113,560원(금일십일만삼천오백육십원)"

  끝_표시:
    rule: "규칙 제4조제5항"
    base_unit: "2타"  # = 한글 1자 = 영숫자 2자 = 스페이스바 2번
    cases:
      본문_종료: "본문 마지막 글자에서 2타 띄우고 '끝.'"
      붙임_종료: "붙임 표시문 다음에 2타 띄우고 '끝.'"
      오른쪽_한계선: "본문/붙임이 한계선에서 끝나면 다음 줄 왼쪽 기본선에서 2타 띄우고 '끝.'"
      표_마지막_칸: "표 아래 왼쪽 기본선 2타 뒤 '끝.'"
      표_중간_종료: "'이하 빈칸' 표시"

  쪽_번호:
    rule: "영 제19조"
    position: "중앙 하단"
    format_simple: "1, 2, 3"
    format_important: "{전체쪽수}-{일련번호}"   # 예: 4-1, 4-2
    examples: ["4-1", "4-2", "4-3"]

  관련문서:
    format: "{기관명} {처리과명}-{등록번호}({등록일자}, \"{제목}\")호"
    example: "ㅇㅇ부 ㅇㅇㅇ과-123(2025. 9. 20., \"ㅇㅇ 행사 관련 협조 요청\")호"

# ═══════════════════════════════════════════════════════════
# 6. 항목 구분 (규칙 제2조제1항, 편람 p51)
# ═══════════════════════════════════════════════════════════
item_markers:
  levels:
    - { level: 1, marker: "1., 2., 3., 4., ..." }
    - { level: 2, marker: "가., 나., 다., 라., ..." }
    - { level: 3, marker: "1), 2), 3), 4), ..." }
    - { level: 4, marker: "가), 나), 다), 라), ..." }
    - { level: 5, marker: "(1), (2), (3), (4), ..." }
    - { level: 6, marker: "(가), (나), (다), (라), ..." }
    - { level: 7, marker: "①, ②, ③, ④, ..." }
    - { level: 8, marker: "㉮, ㉯, ㉰, ㉱, ..." }

  # 초과 시 단모음 순: 하→거→너→더→고→노→도
  overflow_korean: ["하", "거", "너", "더", "러", "머", "버", "서", "어", "저", "처", "커", "터", "퍼", "호", "고", "노", "도"]

  indent:
    base: "2타"           # level_n+1은 level_n 위치에서 2타 들여쓰기
    marker_content_gap: "1타"  # 기호와 내용 사이 1타 띄우기
    wrap_alignment: "항목 내용 첫 글자에 맞춤 (원칙) 또는 왼쪽 기본선"
    single_item: "항목이 하나만 있으면 기호 부여 안 함"

  special_warning: |
    특수기호(①, ㉮ 등 한글 호환 영역)는 전자적으로 입력 오류 가능.
    가급적 유니코드 표준 문자 사용 권장 (편람 p51)

# ═══════════════════════════════════════════════════════════
# 7. 어투 (편람 §3. 이해하기 쉽게 작성, p47)
# ═══════════════════════════════════════════════════════════
tone:
  principles:
    - 정확성  # 6하 원칙, 오탈자 없음
    - 용이성  # 쉬운 말, 구체적 용어
    - 성실성  # 존중, 경어 (고압적 금지)
    - 경제성  # 1건 1매, 표준 서식

  forbidden_endings:
    - pattern: "할 것"
      replacement: "하시기 바랍니다 / 하십시오"
      reason: "위압감 유발"
    - pattern: "하기 바람"
      replacement: "하시기 바랍니다"
      reason: "위압감 유발"
    - pattern: "~음"
      replacement: "하시기 바랍니다"
      reason: "명령적 어미"

  forbidden_expressions:
    - pattern: "치하했다"
      replacement: "말했다"
      reason: "권위적 표현"
    - pattern: "영접"
      replacement: "맞이"
      reason: "권위적 표현"

  discriminatory_expressions_forbidden:
    - "결손가정"
    - "자매결연"
    - "절름발이 행정"
    - "학부형"
    examples:
      reason: "성별·지역·인종·장애 관련 차별적/비하적 표현"

  recommended_endings:
    - "하시기 바랍니다"
    - "하십시오"
    - "드립니다"

# ═══════════════════════════════════════════════════════════
# 8. 개방형 문서 작성 (편람 p35)
# ═══════════════════════════════════════════════════════════
open_format:
  preferred_formats: ["hwpx", "odt", "docx"]
  secondary: ["pdf"]
  rationale: "기계 판독성 + 국민 접근성"

  table_guidelines:
    avoid:
      - "셀 병합·분리"
      - "표 안에 표 삽입"
      - "셀 대각선 삽입"
    reason: "기계 판독성 저해"

  object_guidelines:
    avoid:
      - "도형 개체 (화살표 도형 등)"
    prefer:
      - "특수문자 (→, ⇒, ⇨)"
    reason: "시각적 효과 극대화 필요시만 제한적 사용"

  unicode_guidelines:
    prefer: "국제 유니코드 특수문자"
    avoid: "한글 호환 영역 특수문자 (예: ①, ㉮, ㊀, ㎕)"
    rationale: "기계 판독성 + 호환성"

# ═══════════════════════════════════════════════════════════
# 9. 국어 어문 규범 (편람 p41-46)
# ═══════════════════════════════════════════════════════════
korean_orthography:
  두음법칙:
    pairs:
      남여: 남녀
      년간: 연간
      시설_년도: 시설 연도
      회계_년도: 회계 연도
    note: "단어 첫머리의 '녀·뇨·뉴·니'는 두음법칙에 따라 '여·요·유·이'로 적음"

  사이시옷:
    rules:
      - "순우리말/순우리말+한자 합성어에서 뒷말이 된소리/니/미 소리"
    pairs_correct:
      하교길: 하굣길
      수도물: 수돗물
      최소값: 최솟값
      머릿말: 머리말       # 둘다 한자어라 사이시옷 X
      치과: 치과           # 한자어만이라 X
    pairs_exception:
      # 한자어지만 예외적으로 사이시옷 적용
      - 곳간
      - 셋방
      - 숫자
      - 찻간
      - 툇간
      - 횟수

  가운뎃점_오류:
    pairs:
      "국내·외": 국내외     # 사전에 한 단어면 사용 X
      "상·하수도": 상하수도
      "민·관": 민관
      "시·도": 시도

  띄어쓰기:
    의존명사:
      rule: "앞말과 띄어 씀"
      examples:
        - "296억 달러"
        - "10만 톤"
        - "오십 명"
        - "지원 시"
      exceptions:
        - pattern: "이틀간, 한 달간"
          reason: "기간을 나타내는 '간'은 접미사로 붙여 씀"
    관형사:
      rule: "뒷말과 띄어 씀"
      examples:
        - "본 제도"
        - "총 300대"
      exceptions: ["총감독", "총결산", "총면적"]  # 접두사
    성명:
      rule: "성+이름 붙여 씀 / 호칭·관직명 띄어 씀"
      examples:
        - "홍길동 씨"
        - "행정안전부 장관"

  외래어_표기:
    pairs:
      컨퍼런스: 콘퍼런스
      솔루션: 설루션       # 맞는 표기지만 '솔루션'도 허용
      서포터즈: 서포터스
      숏츠: 쇼트 폼
      메세지: 메시지
      뱃지: 배지
      어플리케이션: 애플리케이션
      워크샵: 워크숍
      파트너쉽: 파트너십

# ═══════════════════════════════════════════════════════════
# 10. 다듬은 말 (쉬운 공문서 쓰기, 편람 p38-40)
# ═══════════════════════════════════════════════════════════
refined_vocabulary:
  english_abbrev:
    AI: "인공 지능(AI)"
    B2B: "기업 간 거래(B2B)"
    P2P: "개인 간 거래(P2P)"
    ICT: "정보 통신 기술(ICT)"
    IoT: "사물 인터넷(IoT)"
    MOU: "업무 협약"
    IR: "기업 설명회(IR)"
    ODA: "공적 개발 원조(ODA)"
    R_and_D: "연구 개발(R&D)"
  english_words:
    As-is: "개선 전"
    To-be: "개선 후"
    "Bottom-up": "상향식"
    거버넌스: "민관 협력"
    리스크: "위험, 손실 우려"
    세션: "분과, 부문"
    스타트업: "창업(초기) 기업, 새싹 기업"
    아웃리치: "현장 지원 활동, 거리 상담"
    업스킬링: "역량 강화"
    쿼터: "한도량, 할당량"
    클러스터: "협력 지구"
    테스트 베드: "시험장, 시험대"
    허브: "중심, 중심지, 거점"
    태스크포스: "전담팀, 특별팀"
    액션 플랜: "실행 계획, 세부 계획"
  chinese_origin:
    수취: 받음
    시찰하다: 살펴보다
    제고하다: 높이다
    추서하다: 훈장을 내리다
    패용하다: 달기/달다
    용이하다: 쉽다
    상이한: 다른
